
<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#050505" />
    <title>رهنما | تور لیدر هوشمند</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100;400;700;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Vazirmatn', sans-serif;
        overflow: hidden;
        background-color: #050505;
        color: #f8fafc;
        -webkit-tap-highlight-color: transparent;
        font-size: 16px;
      }

      .mesh-bg {
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        z-index: -1;
        background: 
          radial-gradient(at 0% 0%, rgba(30, 30, 30, 0.4) 0, transparent 50%),
          radial-gradient(at 100% 100%, rgba(234, 179, 8, 0.03) 0, transparent 50%);
        background-color: #050505;
        contain: strict;
      }

      .glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      
      .premium-text-gradient {
        background: linear-gradient(135deg, #fff 0%, #eab308 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      /* Safe area for iPhones */
      .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
